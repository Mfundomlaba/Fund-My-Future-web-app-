{% extends "base.html" %}

{% block title %}Login | Fund My Future{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Login</h1>

    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit" class="btn">Login</button>
    </form>
</div>
{% endblock %}
