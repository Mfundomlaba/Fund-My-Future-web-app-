{% extends "base.html" %}

{% block title %}Create Scholarship | Fund My Future{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Create Scholarship</h1>

    <form method="POST">
        <label>Title</label>
        <input type="text" name="title" required>

        <label>Provider</label>
        <input type="text" name="provider" required>

        <label>Amount</label>
        <input type="text" name="amount">

        <label>Maximum Number of Applicants</label>
        <input type="number" name="max_applicants" min="1" placeholder="e.g. 50">

        <label>Deadline</label>
        <input type="date" name="deadline" required>

        <label>Description</label>
        <textarea name="description"></textarea>

        <label>Status</label>
        <select name="status" required>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
        </select>

        <button type="submit" class="btn">Create Scholarship</button>
    </form>
</div>
{% endblock %}
